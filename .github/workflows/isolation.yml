name: Isolation Tests

on:
  push:
  pull_request:

jobs:
  isolation:
    name: isolation-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-isolation-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      # Linux: ensure unprivileged user namespaces are available for
      # namespace-based isolation (network, filesystem).
      - name: Enable unprivileged user namespaces (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true

      - name: Build workspace
        shell: bash
        run: cargo build --workspace

      - name: Run isolation tests
        shell: bash
        run: cargo test -p muxox --test isolation_tests -- --nocapture

      - name: Run all workspace tests
        shell: bash
        run: cargo test --workspace --all-features