[[service]]
name = "test-stdin"
cmd = "./test-stdin.sh"
cwd = "./example"
log_capacity = 250
interactive = true

[[service]]
name = "example-service-1"
cmd = "bun ./index.ts"
cwd = "example/packages/example-service-1"
log_capacity = 5000
env_file = "example/packages/example-service-1/.env.example"

[[service]]
name = "example-service-2"
cmd = "bun ./index.ts"
cwd = "example/packages/example-service-2"
log_capacity = 5000

# Isolation example – opt-in per-service sandboxing.
# All flags default to false.  Enable only what you need.
#
# process    = true  # session isolation (setsid on Unix, Job Object on Windows)
# filesystem = true  # restrict writes to the service cwd (macOS sandbox / Linux namespaces)
# network    = true  # deny outbound network access (macOS sandbox / Linux namespaces)
[[service]]
name = "sandboxed-worker"
cmd = "node worker.js"
cwd = "example/packages/worker"
isolation = { process = true, filesystem = true, network = true }